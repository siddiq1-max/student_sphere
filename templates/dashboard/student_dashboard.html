{% extends 'base.html' %}
{% block content %}
<div class="row mt-4">
    <div class="col-12">
        <h2 class="mb-4">Student Dashboard</h2>
        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="card text-dark bg-light border-info h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title text-info">My Attendance</h5>
                        <p class="card-text">View your overall and subject-wise attendance.</p>
                        <a href="{% url 'student_attendance' %}" class="btn btn-outline-info mt-auto">View Attendance</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-4">
                <div class="card text-dark bg-light border-warning h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title text-warning">My Results</h5>
                        <p class="card-text">Check marks uploaded by your teachers.</p>
                        <a href="{% url 'student_results' %}" class="btn btn-outline-warning mt-auto">View Marks</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-4">
                <div class="card text-dark bg-light border-success h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title text-success">Study Materials</h5>
                        <p class="card-text">Download notes and assignments.</p>
                        <a href="{% url 'student_materials' %}" class="btn btn-outline-success mt-auto">Access Files</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
