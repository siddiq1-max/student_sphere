{% extends 'base.html' %}
{% block content %}
<div class="row mt-4">
    <div class="col-12 col-md-8 mx-auto">
        <h2 class="mb-4">Notifications</h2>
        <a href="{% url 'dashboard' %}" class="btn btn-secondary mb-3">Back to Dashboard</a>
        <div class="list-group shadow-sm">
            {% for note in notifications %}
                <div class="list-group-item {% if not note.is_read %}border-start border-primary border-4{% endif %}">
                    <p class="mb-1">{{ note.message }}</p>
                    <small class="text-muted">{{ note.created_at|date:"M d, Y H:i" }}</small>
                </div>
            {% empty %}
                <div class="list-group-item text-center text-muted p-4">You have no notifications.</div>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
